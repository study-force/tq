<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDYFORCE Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:#F8FAFC; min-height:100vh; }

/* 로그인 */
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#F8FAFC; }
.login-card { background:#fff; border:1px solid #E2E8F0; border-radius:16px; padding:48px 40px; width:360px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,.06); }
.login-card h1 { font-size:22px; font-weight:700; color:#1E293B; margin-bottom:8px; }
.login-card h1 span { color:#3B82F6; }
.login-card p { font-size:13px; color:#94A3B8; margin-bottom:32px; }
.login-card input { width:100%; padding:12px 16px; border:1px solid #E2E8F0; border-radius:8px; font-size:14px; font-family:inherit; margin-bottom:16px; text-align:center; }
.login-card input:focus { outline:none; border-color:#3B82F6; }
.login-card button { width:100%; padding:12px; background:#1E293B; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.login-card button:hover { background:#334155; }
.login-error { color:#DC2626; font-size:12px; margin-top:8px; display:none; }

/* 어드민 레이아웃 */
.admin-layout { display:none; flex-direction:column; height:100vh; }

/* 상단 헤더 */
.top-bar { background:#fff; border-bottom:1px solid #E2E8F0; display:flex; align-items:center; padding:0 24px; height:48px; flex-shrink:0; }
.top-bar .logo { font-size:15px; font-weight:700; color:#1E293B; margin-right:32px; }
.top-bar .logo span { color:#3B82F6; }
.top-tabs { display:flex; gap:4px; height:100%; }
.top-tab { display:flex; align-items:center; padding:0 20px; font-size:13px; font-weight:500; color:#64748B; cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap; }
.top-tab:hover { color:#1E293B; background:#F8FAFC; }
.top-tab.active { color:#2563EB; border-bottom-color:#2563EB; font-weight:600; }
.top-right { margin-left:auto; }
.logout-btn { padding:6px 14px; background:transparent; border:1px solid #E2E8F0; border-radius:6px; font-size:11px; color:#64748B; cursor:pointer; font-family:inherit; }
.logout-btn:hover { background:#FEF2F2; color:#DC2626; border-color:#FECACA; }

/* iframe 영역 */
.frame-area { flex:1; }
.frame-area iframe { width:100%; height:100%; border:none; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1><span>STUDYFORCE</span> Admin</h1>
    <p>관리자 비밀번호를 입력하세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 틀렸습니다.</div>
  </div>
</div>

<!-- 어드민 레이아웃 -->
<div class="admin-layout" id="adminLayout">
  <div class="top-bar">
    <div class="logo"><span>SF</span> Admin</div>
    <div class="top-tabs">
      <div class="top-tab active" onclick="navigate(this,'tq_admin_rules.html')">TQ 규칙 관리</div>
      <div class="top-tab" onclick="openNew('https://element.sfcenter.co.kr/admin/dashboard')">엘리먼트 관리 ↗</div>
      <div class="top-tab" onclick="openNew('https://element.sfcenter.co.kr/setup')">학원 관리 ↗</div>
    </div>
    <div class="top-right">
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="frame-area">
    <iframe id="mainFrame" src="tq_admin_rules.html"></iframe>
  </div>
</div>

<script>
const PW = 'asdf1234';

function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PW) {
    sessionStorage.setItem('sf_admin', '1');
    showAdmin();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('sf_admin');
  location.reload();
}

function showAdmin() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminLayout').style.display = 'flex';
}

function navigate(el, url) {
  document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mainFrame').src = url;
}

function openNew(url) {
  window.open(url, '_blank');
}

if (sessionStorage.getItem('sf_admin') === '1') {
  showAdmin();
}
</script>
</body>
</html>
